name: Ping Render Service

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Render Health Endpoint
        run: |
          echo "Pinging Render at $(date -u)"
          curl \
            --silent \
            --location \
            --max-time 30 \
            "${{ secrets.RENDER_URL }}/health" \
            > /dev/null || true

          echo "Ping completed"